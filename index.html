<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Penguin Runner</title>
  <style>
    body { margin: 0; overflow: hidden; background: #fff; position: relative; }
    canvas { display: block; background: #fff; }
    #restartBtn {
      position: absolute;
      top: 25%; left: 50%;
      transform: translate(-50%, -50%);
      background: #a00;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      display: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <button id="restartBtn">может не будем повторять?..</button>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('restartBtn');
    let cw, ch;
    function resize() {
      cw = canvas.width = window.innerWidth;
      ch = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const penguinImg = new Image();
    penguinImg.src = 'penguin.png';

    let gravity = 0.6;
    let jumpStrength = 18;
    let penguin = { x: 50, y: ch - 150, size: 100, vy: 0, jumping: false };
    let groundY = ch - 50;
    let obstacles = [];
    let frame = 0;
    let speed = 6;
    let score = 0;
    let gameOver = false;
    let win = false;
    let animationId;

    function drawPenguin(p) {
      if (penguinImg.complete) ctx.drawImage(penguinImg, p.x, p.y, p.size, p.size);
    }

    function jump() {
      if (!penguin.jumping && !gameOver) {
        penguin.vy = -jumpStrength;
        penguin.jumping = true;
      }
    }
    window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') jump(); });
    window.addEventListener('touchstart', jump);

    function reset() {
      obstacles = [];
      frame = 0;
      score = 0;
      speed = 6;
      gameOver = false;
      win = false;
      penguin.y = groundY - penguin.size;
      penguin.vy = 0;
      penguin.jumping = false;
      btn.style.display = 'none';
      loop();
    }

    function loop() {
      animationId = requestAnimationFrame(loop);
      ctx.clearRect(0, 0, cw, ch);

      ctx.strokeStyle = '#555';
      ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(cw, groundY); ctx.stroke();

      penguin.vy += gravity;
      penguin.y += penguin.vy;
      if (penguin.y + penguin.size >= groundY) {
        penguin.y = groundY - penguin.size;
        penguin.vy = 0;
        penguin.jumping = false;
      }
      drawPenguin(penguin);

      if (frame % 90 === 0) {
        const emojis = ['🪖','🎖️','🛡️','💣','💥'];
        const symbol = emojis[Math.floor(Math.random() * emojis.length)];
        obstacles.push({ x: cw, y: groundY - 40, symbol: symbol });
      }

      ctx.font = '40px sans-serif'; ctx.textBaseline = 'top';
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i]; obs.x -= speed;
        ctx.fillText(obs.symbol, obs.x, obs.y);
        if (penguin.x < obs.x + 40 && penguin.x + penguin.size > obs.x && penguin.y < obs.y + 40 && penguin.y + penguin.size > obs.y) gameOver = true;
        if (obs.x < -40) obstacles.splice(i, 1);
      }

      score += 0.05;
      ctx.fillStyle = '#000'; ctx.font = '20px sans-serif'; ctx.fillText('Score: ' + Math.floor(score), cw - 150, 30);

      if (Math.floor(score) >= 80 && !gameOver) { gameOver = true; win = true; }
      if (frame % 600 === 0) speed += 1;
      frame++;

      if (gameOver) {
        cancelAnimationFrame(animationId);
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, cw, ch);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        if (win) {
          ctx.font = '24px sans-serif';
          ctx.fillText('вы победили, но далее игры не будет, так как интернета тут пока нет...', cw/2, ch/2);
        } else {
          ctx.font = '20px sans-serif';
          ctx.fillText('попробуйте еще раз плиз - обычно помогает практика в 90 часов в неделю', cw/2, ch*0.4);
        }
        btn.style.display = 'block';
      }
    }

    btn.addEventListener('click', () => { if (gameOver) reset(); });
    penguinImg.onload = () => reset();
  </script>
</body>
</html>
